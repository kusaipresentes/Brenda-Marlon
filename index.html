<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brenda & Marlon - Nosso Amor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',sans-serif;
  background: linear-gradient(135deg,#f8f3f1 0%,#fff8f6 100%);
  color:#222;
  min-height:100vh;
}
#welcome-screen {
  position:fixed; inset:0; background:white; z-index:9999;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  transition:.8s;
}
.welcome-heart { font-size:90px; cursor:pointer; animation:heartbeat 1.4s infinite; }
.welcome-text { margin-top:18px; font-size:24px; font-family:'Playfair Display',serif; color:#dc6478; }
@keyframes heartbeat { 0%,100%{transform:scale(1);} 25%{transform:scale(1.08);} 50%{transform:scale(1);} }
.container {
  max-width:520px; margin:auto; padding:28px 22px 60px;
  opacity:0; transform:translateY(20px); transition:1s;
}
.container.visible { opacity:1; transform:none; }
.hero { text-align:center; margin-top:20px; }
.photo { border-radius:30px; overflow:hidden; box-shadow:0 20px 60px rgba(220,100,120,.18); border:1px solid rgba(255,255,255,.6); margin-bottom:28px; }
.photo img { width:100%; display:block; }
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px; font-weight: 700;
  background: linear-gradient(135deg, #dc6478 0%, #e8839a 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.card {
  background:rgba(255,255,255,.72); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.6);
  padding:26px; border-radius:28px; margin-top:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}
.title { font-size:12px; letter-spacing:3px; text-transform:uppercase; font-weight:700; opacity:.45; margin-bottom:14px; }
.message { font-size:28px; line-height:1.35; font-family:'Playfair Display',serif; color:#2d2d2d; }
.counter { font-size:34px; font-weight:700; background:linear-gradient(135deg,#dc6478,#ea8da0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.music-player { display:flex; align-items:center; gap:16px; }
.music-cover {
  width:68px; height:68px; border-radius:18px;
  background: url('Ainda-bem-Menos-e-mais.png') center/cover;
  box-shadow:0 10px 25px rgba(220,100,120,.3);
}
/* Ondas Sonoras */
.wave {
  display: flex;
  align-items: flex-end;
  gap: 5px;
  height: 32px;
  margin-top: 8px;
}

.bar {
  width: 5px;
  height: 8px;
  background: #dc6478;
  border-radius: 999px;
  animation: none;
  transition: height 0.15s ease;
}

.playing .bar {
  animation: soundwave 1.3s infinite ease-in-out;
}

.playing .bar:nth-child(1) { animation-delay: 0s; }
.playing .bar:nth-child(2) { animation-delay: 0.18s; }
.playing .bar:nth-child(3) { animation-delay: 0.36s; }
.playing .bar:nth-child(4) { animation-delay: 0.54s; }
.playing .bar:nth-child(5) { animation-delay: 0.72s; }

@keyframes soundwave {
  0%, 100% { height: 8px; }
  40% { height: 30px; }
  70% { height: 18px; }
}
.modal-content {
  background:white; padding:30px; border-radius:28px; max-width:420px; width:100%; text-align:center;
}
</style>
</head>
<body>

<div id="welcome-screen" onclick="startExperience()">
  <div class="welcome-heart">❤️</div>
  <div class="welcome-text">Clique para abrir</div>
</div>

<audio id="bg-music" loop>
  <source src="Ainda-bem-Menos-e-mais.mp3.mp3" type="audio/mpeg">
</audio>

<div class="container" id="main-content">
  <div class="hero">
    <div class="photo"><img src="foto-casal.jpeg" alt="Brenda & Marlon"></div>
    <h1>Brenda & Marlon</h1>
    <div style="font-family:'Playfair Display',serif; font-size:22px; color:#dc6478; text-align:center;">
      Nosso amor é a melhor parte da minha vida
    </div>
  </div>

  <div class="card">
    <div class="title">Mensagem de hoje</div>
    <div class="message" id="dailyMessage">Carregando...</div>
  </div>

  <div class="card">
    <div class="title">Nosso tempo junto</div>
    <div class="counter" id="counter">...</div>
    <div class="small">Desde 18/03/2024</div>
  </div>

  <!-- MÚSICA -->
  <div class="card">
    <div class="title">Nossa música</div>
    <div class="music-player playing" id="music-player">
      <div class="music-cover"></div>
      <div style="flex:1">
        <div style="font-weight:700;">Ainda Bem</div>
        <div style="color:#777; font-size:14px;">Menos é Mais</div>
        <div class="wave">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
    </div>
    <button id="music-btn" onclick="toggleMusic()">⏸️ Pausar Música</button>
  </div>

  <div class="card">
    <div class="title">Surpresa</div>
    <button id="surpriseBtn" class="surprise-btn" onclick="triggerSurprise()">Clique para descobrir ✨</button>
  </div>

  <!-- FOOTER -->
  <div class="footer" style="margin-top:50px; text-align:center; padding-bottom:30px;">
    <div style="display:flex; justify-content:center; gap:16px; margin-bottom:20px;">
      <a href="https://instagram.com/kusaipresentes" target="_blank" style="width:54px;height:54px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;text-decoration:none;color:#dc6478;font-size:24px;box-shadow:0 8px 22px rgba(0,0,0,.08);">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://wa.me/5521983034801" target="_blank" style="width:54px;height:54px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;text-decoration:none;color:#dc6478;font-size:24px;box-shadow:0 8px 22px rgba(0,0,0,.08);">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
    <div style="font-size:13px; color:#888;">criado com ❤️ por Kusai Presentes</div>
  </div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
const startDate = new Date(2024, 2, 18);

const specialMessages = {
  "12-06": "12/06 - Eu escolhi você para ficar, meu grande amor! 😍"
};

const dailyMessages = [ /* suas 60 mensagens aqui - mantidas */ 
  "Você ainda é meu lugar favorito.", "Seu abraço continua sendo minha paz.",
  /* ... (cole todas as 60 mensagens que já estavam no código) ... */
];

let surprisesPool = [];
let currentSurprises = [];

function resetSurprises() {
  surprisesPool = [
    // IMAGEM (recado.png)
    { type: "image", content: "recado.png", title: "Uma mensagem especial pra você 💌" },
    
    // Foto surpresa
    { type: "image", content: "foto-surpresa.jpeg", title: "Uma foto especial pra você 📸" },
    
    // Vídeo
    { type: "video", content: "video-surpresa.mp4", title: "Nossos momentos 🎥" },
    
    // ÁUDIO (opcional - descomente quando quiser usar)
    // { type: "audio", content: "audio-surpresa.mp3", title: "Uma mensagem de voz pra você 🎙️" },
    
    // 20 mensagens curtas
    { type: "text", content: "Mesmo quando você não está por perto, meu dia continua cheio de você." },
    { type: "text", content: "Você é a melhor parte da minha rotina." },
    { type: "text", content: "Só de saber que vou te ver mais tarde, meu coração já sorri." },
    { type: "text", content: "Não existe distância quando alguém mora nos nossos pensamentos." },
    { type: "text", content: "Você transforma qualquer dia comum em um dia especial." },
    { type: "text", content: "Meu lugar favorito continua sendo ao seu lado." },
    { type: "text", content: "Mesmo nas horas em que estamos longe, sinto você perto de mim." },
    { type: "text", content: "Seu abraço ainda é o lugar onde eu encontro paz." },
    { type: "text", content: "Você faz parte de todos os meus melhores momentos, até dos mais simples." },
    { type: "text", content: "O meu dia sempre fica melhor quando lembro que tenho você." },
    { type: "text", content: "Você está presente até nos pequenos detalhes da minha vida." },
    { type: "text", content: "Não importa quanto tempo passe até a gente se encontrar de novo, você continua sendo o meu pensamento favorito." },
    { type: "text", content: "Ter você na minha vida faz qualquer espera valer a pena." },
    { type: "text", content: "A melhor lembrança do meu dia quase sempre envolve você." },
    { type: "text", content: "Às vezes eu paro e sorrio, só porque lembrei de nós." },
    { type: "text", content: "Você é aquela parte boa do dia que nunca perde a graça." },
    { type: "text", content: "O amor que sinto por você aparece nas coisas mais simples." },
    { type: "text", content: "Você consegue fazer meu coração se sentir em casa, mesmo quando não está aqui." },
    { type: "text", content: "Se existe um lugar onde eu sempre quero voltar, esse lugar é você." },
    { type: "text", content: "Quando você ler isso, só quero que saiba: amar você continua sendo a coisa mais bonita que acontece nos meus dias." }
  ];
  shuffleArray(surprisesPool);
  currentSurprises = [...surprisesPool];
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// ==================== FUNÇÕES ====================
function startExperience(){
  document.getElementById('bg-music').play().catch(()=>{});
  document.getElementById('welcome-screen').style.opacity = '0';
  setTimeout(() => document.getElementById('welcome-screen').style.visibility='hidden', 800);
  document.getElementById('main-content').classList.add('visible');
  loadDailyMessage(); updateCounter();
  resetSurprises();
}

function toggleMusic(){
  const music = document.getElementById('bg-music');
  const btn = document.getElementById('music-btn');
  const player = document.getElementById('music-player');

  if(music.paused){
    music.play();
    btn.innerHTML = '⏸️ Pausar Música';
    player.classList.add('playing');
  } else {
    music.pause();
    btn.innerHTML = '▶️ Tocar Música';
    player.classList.remove('playing');
  }
}

function loadDailyMessage(){
  const now = new Date();
  const key = `${now.getMonth()+1}`.padStart(2,'0') + '-' + `${now.getDate()}`.padStart(2,'0');
  document.getElementById('dailyMessage').innerText = specialMessages[key] || dailyMessages[Math.floor(Math.random()*dailyMessages.length)];
}

function updateCounter(){
  const now = new Date();
  let years = now.getFullYear() - startDate.getFullYear();
  let months = now.getMonth() - startDate.getMonth();
  let days = now.getDate() - startDate.getDate();
  if(days < 0){ months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
  if(months < 0){ years--; months += 12; }
  document.getElementById('counter').innerText = `${years} anos, ${months} meses e ${days} dias`;
}

function triggerSurprise(){
  createConfetti();
  if (currentSurprises.length === 0) resetSurprises();
  const item = currentSurprises.pop();
  showModal(item);
}

function createConfetti(){
  const colors = ['#dc6478','#ea8da0','#ffd1dc'];
  for(let i=0; i<50; i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (Math.random()*2.5 + 1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function showModal(item){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const content = document.createElement('div');
  content.className = 'modal-content';
  
  let html = '';

  if(item.type === 'text'){
    html = `<p style="font-size:24px; line-height:1.6; padding:25px 15px; color:#3f2a1e; font-family:'Playfair Display',serif;">
              ${item.content}
            </p>`;
  } 
  else if(item.type === 'image'){
    content.style.padding = '6px';
    content.style.maxWidth = '520px';
    content.style.borderRadius = '14px';
    html = `<img src="${item.content}" style="width:100%; max-height:80vh; object-fit:contain; border-radius:10px; display:block;">`;
  } 
  else if(item.type === 'video'){
    const bgMusic = document.getElementById('bg-music');
    const btn = document.getElementById('music-btn');
    const player = document.getElementById('music-player');

    if (bgMusic && !bgMusic.paused) {
      bgMusic.pause();
      if (btn) btn.innerHTML = '▶️ Tocar Música';
      if (player) player.classList.remove('playing');
    }

    html = `
      <h3 style="margin-bottom:12px;">${item.title}</h3>
      <video autoplay controls playsinline style="width:100%; max-height:58vh; border-radius:12px; background:#000; display:block;">
        <source src="${item.content}" type="video/mp4">
      </video>
    `;
  }
  else if(item.type === 'audio'){
    html = `
      <h3>${item.title}</h3>
      <audio controls autoplay style="width:100%; margin-top:15px;">
        <source src="${item.content}" type="audio/mpeg">
      </audio>
    `;
  }
  
  content.innerHTML = html;

  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'Fechar ❤️';
  closeBtn.onclick = () => overlay.remove();
  content.appendChild(closeBtn);

  overlay.appendChild(content);
  document.body.appendChild(overlay);
}
</script>
</body>
</html>
