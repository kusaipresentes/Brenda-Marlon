/* Bilhetinho Romântico */
.note {
  background: #fffaf0;

  font-size: 23px;
  line-height: 1.55;
  color: #3f2a1e;
  text-align: center;
}

/* Pequeno coração decorativo */
.note::after {
  content: "❤️";

  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  opacity: 0.85;

.wave { display:flex; align-items:flex-end; gap:3px; height:22px; }
.bar { width:4px; height:6px; background:#dc6478; border-radius:20px; animation:wave 0.9s infinite ease-in-out; }

.bar:nth-child(3){animation-delay:.2s;}
.bar:nth-child(4){animation-delay:.3s;}

button {

@keyframes surprisePulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }

.modal-overlay {

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// ==================== FUNÇÕES PRINCIPAIS ====================
function startExperience(){
  document.getElementById('bg-music').play().catch(()=>{});
  document.getElementById('welcome-screen').style.opacity = '0';
  setTimeout(() => document.getElementById('welcome-screen').style.visibility='hidden', 800);
  document.getElementById('main-content').classList.add('visible');
  loadDailyMessage();
  updateCounter();
  resetSurprises();
}

function toggleMusic(){
  const music = document.getElementById('bg-music');
  const btn = document.getElementById('music-btn');
  if(music.paused){
    music.play();
    btn.innerHTML = '⏸️ Pausar Música';
  } else {
    music.pause();
    btn.innerHTML = '▶️ Tocar Música';
  }
}

function loadDailyMessage(){
  const now = new Date();
  const key = `${now.getMonth()+1}`.padStart(2,'0') + '-' + `${now.getDate()}`.padStart(2,'0');
  document.getElementById('dailyMessage').innerText = specialMessages[key] || dailyMessages[Math.floor(Math.random()*dailyMessages.length)];
}

function updateCounter(){
  const now = new Date();
  let years = now.getFullYear() - startDate.getFullYear();
  let months = now.getMonth() - startDate.getMonth();
  let days = now.getDate() - startDate.getDate();
  if(days < 0){ months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
  if(months < 0){ years--; months += 12; }
  document.getElementById('counter').innerText = `${years} anos, ${months} meses e ${days} dias`;
}

function triggerSurprise(){
  createConfetti();
  if (currentSurprises.length === 0) resetSurprises();
  const item = currentSurprises.pop();
  showModal(item);
}

function createConfetti(){
  const colors = ['#dc6478','#ea8da0','#ffd1dc'];
  for(let i=0; i<50; i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (Math.random()*2.5 + 1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function showModal(item){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const content = document.createElement('div');
  content.className = 'modal-content';
  
  let html = '';

  if(item.type === 'text'){
    if(item.content.includes("Amor, só queria te lembrar que você é uma das melhores coisas")) {
      // Bilhetinho só para a mensagem especial
      html = `<div class="note">${item.content}</div>`;
    } else {
      // Mensagens curtas normais
      html = `<p style="font-size:24px; line-height:1.6; padding:25px 15px; color:#3f2a1e; font-family:'Playfair Display',serif;">
                ${item.content}
              </p>`;
    }
  } 
  else if(item.type === 'image'){
    html = `<h3>${item.title}</h3><img src="${item.content}" style="max-width:100%;border-radius:16px;">`;
  } 
  else if(item.type === 'video'){
    html = `<h3>${item.title}</h3><video controls autoplay><source src="${item.content}"></video>`;
  }
  
  content.innerHTML = html;

  const btn = document.createElement('button');
  btn.textContent = 'Fechar ❤️';
  btn.onclick = () => overlay.remove();
  content.appendChild(btn);

  overlay.appendChild(content);
  document.body.appendChild(overlay);
}
